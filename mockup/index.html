<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bento · Mockups</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="themes.jsx"></script>
<script type="text/babel" src="content.jsx"></script>
<script type="text/babel" src="workspace.jsx"></script>
<script type="text/babel" src="overlays.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const T = window.THEMES;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="workspaces"
        title="Bento · macOS workspace"
        subtitle="Four aesthetic directions for the same layout · tiling multiplexer + native editor"
      >
        <DCArtboard id="carbon" label="A · Carbon — monochrome, hairlines" width={1400} height={900}>
          <BentoWorkspace theme={T.carbon} />
        </DCArtboard>
        <DCArtboard id="bento" label="B · Bento — lacquer black, amber accent" width={1400} height={900}>
          <BentoWorkspace theme={T.bento} />
        </DCArtboard>
        <DCArtboard id="tokyo" label="C · Tokyo — violet over ink" width={1400} height={900}>
          <BentoWorkspace theme={T.tokyo} />
        </DCArtboard>
        <DCArtboard id="paper" label="D · Paper — warm cream, ink, restraint" width={1400} height={900}>
          <BentoWorkspace theme={T.paper} />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="details"
        title="WOW-feature details"
        subtitle="The same workspace, focused on the three pillars: command palette · ripgrep search · session resurrection"
      >
        <DCArtboard id="palette" label="Command palette (⌘K) · Carbon" width={1400} height={900}>
          <BentoOverlay theme={T.carbon} overlay="palette" />
        </DCArtboard>
        <DCArtboard id="ripgrep" label="Project search (⌘⇧F) · Tokyo" width={1400} height={900}>
          <BentoOverlay theme={T.tokyo} overlay="ripgrep" />
        </DCArtboard>
        <DCArtboard id="resurrect" label="Session resurrection · Bento" width={1400} height={900}>
          <BentoOverlay theme={T.bento} overlay="resurrect" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
